<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <div id="progress-bar" class="progress-bar"></div>

  <main class="article-container">

    <div class="typography-controls">
      <button id="font-smaller" title="Diminuir fonte">A-</button>

    <article id="article-content">
      <p class="loading">Carregando artigo…</p>

    <aside id="article-index" class="article-index" style="display:none;">

    <nav id="index-nav" class="index-content"></nav>
    </aside>

    <section id="related-articles" class="related-section" style="display:none;">
      <h2>Artigos relacionados</h2>
      <div id="related-list" class="related-list"></div>
    </section>

  </main>

  <button id="back-to-top" class="back-to-top" title="Voltar ao topo">
