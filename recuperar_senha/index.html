<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Artigos Científicos</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="container">
        <div class="recover-box" style="max-width: 500px; margin: 50px auto;">
            <h2>Recuperar Senha</h2>
            <form id="recover-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Pergunta de Segurança</label>
                    <input type="text" id="pergunta" required>
                </div>
                <div class="form-group">
                    <label>Resposta</label>
                    <input type="text" id="resposta" required>
                </div>
                <div class="form-group">
                    <label>Nova Senha</label>
                    <input type="password" id="nova_senha" required>
                </div>
                <button type="submit" class="btn">Redefinir Senha</button>
                <div id="error" class="error"></div>
                <div id="success" class="success"></div>
            </form>
        </div>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
