<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Artigos Científicos</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="container">
        <div class="login-box" style="max-width: 400px; margin: 50px auto;">
            <h2>Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">Entrar</button>
                <div id="error" class="error"></div>
            </form>
            <p style="margin-top: 15px;"><a href="/recuperar_senha/index.html">Esqueceu a senha?</a></p>
            <p>Não tem conta? <a href="/registro/index.html">Registre-se</a></p>
        </div>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
