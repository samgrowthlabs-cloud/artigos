<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigo - Artigos Científicos</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="container">
        <article id="article-container"></article>
        <div id="comments-section" class="comments-section">
            <h3>Comentários</h3>
            <div id="comments-list"></div>
            <div id="new-comment">
                <textarea id="comment-content" rows="3" placeholder="Escreva um comentário..."></textarea>
                <button id="submit-comment" class="btn">Enviar Comentário</button>
            </div>
        </div>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
