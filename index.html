<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        BIDARTIGOS
      </a>
      <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="Modo escuro">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <nav>
        <a href="">Artigos</a>
        <a href="sobre/">Sobre</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">Artigos</h1>

    <div class="search-area">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="search-input" placeholder="Pesquisar artigos..." autocomplete="off">
      </div>
      <select id="category-filter">
        <option value="">Todas as categorias</option>
      </select>
      <select id="period-filter">
        <option value="">Todos os períodos</option>
        <option value="7">Últimos 7 dias</option>
        <option value="30">Últimos 30 dias</option>
        <option value="90">Últimos 90 dias</option>
        <option value="365">Este ano</option>
      </select>
      <select id="sort-by" class="sort-select">
        <option value="relevance">Mais relevante</option>
        <option value="recent">Mais recentes</option>
        <option value="views">Mais visualizados</option>
        <option value="likes">Mais curtidos</option>
      </select>
    </div>

    <div id="articles-list" class="articles-list">
      <p class="loading">Carregando artigos…</p>
    </div>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8061535180990391"
          crossorigin="anonymous"></script>

          (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    <div id="empty-state" class="empty-state" style="display:none;">
      <p>Nenhum artigo encontrado.</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 BIDARTIGOS</p>
  </footer>

  <script src="config.js"></script>
  <script src="script.js"></script>
