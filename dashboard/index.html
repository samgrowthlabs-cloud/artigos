<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Artigos Científicos</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="container">
        <h2>Dashboard de Moderação</h2>

        <section id="pending-section">
            <h3>📄 Artigos Aguardando Aprovação</h3>
            <div id="pending-list" class="scrollable-list"></div>
        </section>

        <section id="admin-section" style="display: none;">
            <h3>👥 Gerenciar Usuários</h3>
            <div id="users-list" class="scrollable-list"></div>
        </section>
    </main>

    <!-- Modal para visualização do artigo -->
    <div id="article-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button id="modal-approve" class="btn btn-success">Aprovar</button>
                <button id="modal-reject" class="btn btn-danger">Rejeitar</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
